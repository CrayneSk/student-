<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saint Official</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    overflow: hidden;
}

/* Dark overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

/* Glass */
.glass {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

/* Container */
.container {
    position: relative;
    width: 90%;
    max-width: 1000px;
    padding: 30px;
    text-align: center;
    animation: fadeIn 1.5s ease;
}

/* Animations */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-5px);}
}

/* Hero */
h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
    letter-spacing: 2px;
}

p {
    opacity: 0.85;
}

/* Services */
.services {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-top: 30px;
}

.card {
    padding: 20px;
    transition: 0.3s;
    animation: float 4s ease-in-out infinite;
}

.card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 10px 25px rgba(255,255,255,0.2);
}

/* Contact */
.contact {
    margin-top: 30px;
}

/* Buttons */
.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 22px;
    border-radius: 25px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
}

.btn:hover {
    background: rgba(255,255,255,0.35);
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,255,255,0.5);
}

/* Form */
form {
    margin-top: 20px;
}

input, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
}

input::placeholder, textarea::placeholder {
    color: #ddd;
}

textarea {
    resize: none;
    height: 100px;
}

/* Footer */
footer {
    margin-top: 20px;
    font-size: 0.8em;
    opacity: 0.7;
}

/* Parallax effect */
body {
    background-attachment: fixed;
}
</style>
</head>

<body>

<div class="container glass">

    <!-- Hero -->
    <h1>SAINT OFFICIAL SITE</h1>
    <p>We connect you through memes and powerful advertising</p>

    <!-- Services -->
    <div class="services">
        <div class="card glass">WE OFFER MEMES</div>
        <div class="card glass">WHATSAPP ADVERTISING</div>
        <div class="card glass">VERIFIED WHATSAPP BUSINESS</div>
        <div class="card glass">VERIFIED MEMES CHANNEL</div>
    </div>

    <!-- Contact -->
    <div class="contact">
        <h3>Contact Saint Official</h3>
        <p>+263 71 355 1214</p>

        <div>
            <!-- WhatsApp Direct Chat -->
            <a class="btn" href="https://wa.me/263713551214" target="_blank">WhatsApp</a>

            <a class="btn" href="#">Email</a>
            <a class="btn" href="#">Instagram</a>
            <a class="btn" href="#">Twitter</a>
        </div>
    </div>

    <!-- Form -->
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Enter your message and we will get back to you"></textarea>
        <button class="btn" type="submit">Send Message</button>
    </form>

    <!-- Footer -->
    <footer>
        © SAINT OFFICIAL
    </footer>

</div>

</body>
</html>
