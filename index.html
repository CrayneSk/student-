<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saint Official</title>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    min-height: 100vh;
    background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 15px;
    color: white;
}

/* Overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
    top: 0;
    left: 0;
    z-index: 0;
}

/* Glass */
.glass {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

/* Container */
.container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1000px;
    padding: 25px;
    text-align: center;
}

/* Title */
.main-title {
    font-size: 2.5em;
    font-weight: bold;
    letter-spacing: 3px;
    margin-bottom: 15px;
    background: linear-gradient(90deg, #fff, #ccc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Subtitle */
.subtitle {
    opacity: 0.85;
    margin-bottom: 20px;
}

/* Services */
.services {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

.card {
    padding: 25px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px) scale(1.05);
}

/* Contact */
.contact {
    margin-top: 35px;
}

/* Buttons */
.btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 10px;
    padding: 12px 22px;
    border-radius: 25px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

/* Brand colors */
.whatsapp { background: #25D366; }
.email { background: rgba(255,255,255,0.25); }
.instagram { background: #E1306C; }
.x { background: black; }

.btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 15px rgba(255,255,255,0.6);
}

/* Form */
form {
    margin-top: 25px;
}

input, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: white;
}

textarea {
    height: 100px;
    resize: none;
}

input::placeholder, textarea::placeholder {
    color: #ddd;
}

/* Footer */
footer {
    margin-top: 20px;
    font-size: 0.8em;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="container glass">

    <!-- Title -->
    <div class="main-title">SAINT OFFICIAL SITE</div>
    <div class="subtitle">We connect you through memes and powerful advertising</div>

    <!-- Services -->
    <div class="services">
        <div class="card glass">WE OFFER MEMES</div>
        <div class="card glass">WHATSAPP ADVERTISING</div>
        <div class="card glass">VERIFIED WHATSAPP BUSINESS</div>
        <div class="card glass">VERIFIED MEMES CHANNEL</div>
    </div>

    <!-- Contact -->
    <div class="contact">
        <h3>Contact Saint Official</h3>
        <p>+263 71 355 1214</p>

        <div>
            <a class="btn whatsapp" href="https://wa.me/263713551214" target="_blank">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>

            <a class="btn email" href="mailto:your@email.com">
                <i class="fas fa-envelope"></i> Email
            </a>

            <a class="btn instagram" href="#">
                <i class="fab fa-instagram"></i> Instagram
            </a>

            <a class="btn x" href="#">
                <i class="fab fa-x-twitter"></i> X
            </a>
        </div>
    </div>

    <!-- Form -->
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Enter your message and we will get back to you"></textarea>
        <button class="btn" type="submit">Send Message</button>
    </form>

    <!-- Footer -->
    <footer>
        © SAINT OFFICIAL
    </footer>

</div>

</body>
</html>
