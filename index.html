<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp AI - Pairing System</title>
    <meta name="description" content="Secure WhatsApp AI pairing system — connect your device with a unique pairing code.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-particles" id="particlesContainer"></div>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Header -->
        <header class="header">
            <div class="logo-wrapper">
                <div class="logo-icon">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M24 4C12.954 4 4 12.954 4 24c0 3.514.906 6.812 2.486 9.674L4 44l10.672-2.604A19.89 19.89 0 0024 44c11.046 0 20-8.954 20-20S35.046 4 24 4z" fill="url(#waGradient)" />
                        <path d="M33.2 27.8c-.4-.2-2.4-1.2-2.8-1.4-.4-.2-.6-.2-.8.2-.2.4-1 1.4-1.2 1.6-.2.2-.4.2-.8 0-2.2-1-3.6-2-5-4.4-.4-.6.4-.6 1-1.8.2-.4 0-.6-.2-.8-.2-.2-1.6-3.8-2.2-5.2-.6-1.4-1.2-1.2-1.6-1.2h-1.4c-.4 0-1.2.2-1.8.8-.6.6-2.4 2.4-2.4 5.8s2.6 6.8 3 7.2c.4.4 5.2 8 12.6 11 .6.2 2.2.6 3.8.4 1.6-.2 4.8-2 5.4-3.8.6-1.8.6-3.4.4-3.8-.2-.4-.6-.6-1-.8z" fill="#fff" />
                        <defs>
                            <linearGradient id="waGradient" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#25D366" />
                                <stop offset="1" stop-color="#128C7E" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1 class="logo-title">WhatsApp <span>AI</span></h1>
                    <p class="logo-subtitle">Secure Pairing System</p>
                </div>
            </div>
        </header>

        <!-- Card -->
        <section class="pairing-card">
            <div class="card-inner">
                <!-- Status Indicator -->
                <div class="status-bar">
                    <div class="status-dot" id="statusDot"></div>
                    <span class="status-text" id="statusText">Awaiting input</span>
                </div>

                <!-- Phone Input Section -->
                <div class="input-section">
                    <label for="phoneInput" class="input-label">Phone Number</label>
                    <div class="input-group">
                        <span class="input-prefix">+</span>
                        <input
                            type="tel"
                            id="phoneInput"
                            class="phone-input"
                            placeholder="1 555 123 4567"
                            autocomplete="tel"
                            maxlength="18"
                            inputmode="numeric"
                        />
                        <button class="input-clear" id="clearBtn" type="button" aria-label="Clear input">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                                <line x1="18" y1="6" x2="6" y2="18" />
                                <line x1="6" y1="6" x2="18" y2="18" />
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">Enter the phone number linked to your WhatsApp account</p>
                    <p class="input-error" id="inputError"></p>
                </div>

                <!-- Generate Button -->
                <button class="generate-btn" id="generateBtn" type="button">
                    <span class="btn-content">
                        <span class="btn-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0110 0v4" />
                            </svg>
                        </span>
                        <span class="btn-text">Generate Pairing Code</span>
                    </span>
                    <span class="btn-loader" id="btnLoader">
                        <span class="loader-ring"></span>
                    </span>
                </button>

                <!-- Pairing Code Display -->
                <div class="code-display" id="codeDisplay">
                    <div class="code-header">
                        <span class="code-label">Your Pairing Code</span>
                        <button class="code-copy" id="copyBtn" type="button" title="Copy code">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
                            </svg>
                        </button>
                    </div>
                    <div class="code-value-container">
                        <span class="code-value" id="codeValue">---- ----</span>
                        <span class="code-copied-feedback" id="copyFeedback">Copied!</span>
                    </div>
                    <p class="code-expiry" id="codeExpiry"></p>
                </div>

                <!-- Info Note -->
                <div class="info-note">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="16" x2="12" y2="12" />
                        <line x1="12" y1="8" x2="12.01" y2="8" />
                    </svg>
                    <span>This code is valid for <strong>5 minutes</strong>. Do not share it with anyone.</span>
                </div>
            </div>

            <!-- Card Edge Glow -->
            <div class="card-glow"></div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 WhatsApp AI &mdash; End-to-end encrypted pairing</p>
        </footer>
    </main>

    <!-- Toast Notification -->
    <div class="toast" id="toast" role="alert" aria-live="polite">
        <span class="toast-icon">&#10003;</span>
        <span class="toast-message" id="toastMessage">Code copied to clipboard</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
